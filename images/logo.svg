<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient for Luxury Aesthetic -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5AB" />
      <stop offset="40%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#F3E5AB" />
    </linearGradient>
    
    <linearGradient id="silverGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E5C158" />
    </linearGradient>
  </defs>

  <style>
    .logo-text {
      font-family: 'Playfair Display', 'Cormorant Garamond', 'Cinzel', serif;
      font-size: 58px;
      font-weight: 300;
      fill: #FFFFFF;
      letter-spacing: 1px;
    }
    .logo-events {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 18px;
      font-weight: 500;
      fill: #D4AF37;
      letter-spacing: 12px;
    }
    .logo-line {
      stroke: rgba(212, 175, 55, 0.6);
      stroke-width: 1;
    }
    .big-n-upright {
      stroke: url(#goldGradient);
      stroke-width: 2.5;
    }
  </style>

  <!-- Left Text: Grace -->
  <text x="30" y="112" class="logo-text">Grace</text>

  <!-- Big Central N Monogram with Elegant Swoop -->
  <g transform="translate(240, 30)">
    <!-- Left Vertical Stave of N -->
    <line x1="12" y1="52" x2="12" y2="105" class="big-n-upright" />
    
    <!-- Dramatic Swooping Diagonal N Stroke -->
    <path d="M -70 18 C -20 0, 35 30, 85 125 C 105 155, 145 168, 170 162" 
          fill="none" stroke="url(#goldGradient)" stroke-width="6" stroke-linecap="round" />
    
    <!-- Right Vertical Stave of N -->
    <line x1="98" y1="52" x2="98" y2="105" class="big-n-upright" />
  </g>

  <!-- Right Text: Gather -->
  <text x="360" y="112" class="logo-text">Gather</text>

  <!-- Horizontal Divider Line under Gather -->
  <line x1="365" y1="124" x2="550" y2="124" class="logo-line" />

  <!-- Subtitle Text: EVENTS -->
  <text x="382" y="148" class="logo-events">EVENTS</text>
</svg>
